# 每平台每週固定的發布時段
# /generate-calendar 讀這份 → 為下週每個 slot 建一列 Sheet
# /publish-now 不直接讀此檔，它只看 Sheet 的 date+time
#
# 商業規則：**只在週二 + 週三發文**（客戶要求）
#   為滿足 PRD §3.2 FR-2.2（每平台每週 ≥ 3 篇貼文 + 2 支短影音），
#   兩天內必須塞滿 3 posts + 2 shorts，因此單日會有 2 篇同平台貼文
#   （時段錯開 ≥ 6 小時以降低 reach 重疊）

timezone: Asia/Taipei

# day: mon|tue|wed|thu|fri|sat|sun
# time: 24h "HH:MM"
slots:

  facebook:    # 3 篇貼文 / 週
    - { day: tue, time: "10:00", kind: post }
    - { day: tue, time: "20:00", kind: post }
    - { day: wed, time: "14:00", kind: post }

  instagram:   # 3 篇貼文 / 週
    - { day: tue, time: "12:00", kind: post }
    - { day: wed, time: "12:00", kind: post }
    - { day: wed, time: "20:00", kind: post }

  x:           # 3 篇推文 / 週
    - { day: tue, time: "11:00", kind: post }
    - { day: tue, time: "21:00", kind: post }
    - { day: wed, time: "15:00", kind: post }

  youtube:     # 每週 2 支 Shorts
    - { day: tue, time: "19:00", kind: short }
    - { day: wed, time: "19:00", kind: short }

  tiktok:      # 每週 2 支短影音
    - { day: tue, time: "20:00", kind: short }
    - { day: wed, time: "21:00", kind: short }

# 給 publish-now 用
# 語意：status=scheduled 且 -early_window_minutes ≤ (當下 - date+time) ≤ publish_window_minutes → 發
# 三種情境：
#   1. 當下 < date+time 但差距 ≤ early_window_minutes → 提前發（routine tick 錯開時避免等下一輪）
#   2. date+time ≤ 當下 ≤ date+time + publish_window_minutes → 補發
#   3. 當下 - date+time > publish_window_minutes → 太舊，notes 寫 stale，保留 scheduled 給人工
cron:
  interval_minutes: 15           # routine 觸發頻率（僅參考，實際由 routine 設定）
  early_window_minutes: 0        # 提前發窗：0 = 不提前，必須到點或之後才發
  publish_window_minutes: 10     # 補發窗：slot 時間過後、仍可補發多久（此處 = 10 分）
